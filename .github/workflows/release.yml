name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────
  # CLI 바이너리 빌드 (Windows / macOS / Linux)
  # ──────────────────────────────────────────────
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: claude-sync.exe
            archive: claude-sync-cli-windows-x64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: claude-sync
            archive: claude-sync-cli-macos-arm64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: claude-sync
            archive: claude-sync-cli-macos-x64.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: claude-sync
            archive: claude-sync-cli-linux-x64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p claude-sync

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.artifact }}" -DestinationPath "${{ matrix.archive }}"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar czf "${{ matrix.archive }}" -C "target/${{ matrix.target }}/release" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # ──────────────────────────────────────────────
  # Tauri GUI 빌드 (Windows .exe / macOS .dmg)
  # ──────────────────────────────────────────────
  build-gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crates/claude-sync-gui/frontend/pnpm-lock.yaml

      # Linux: Tauri 빌드에 필요한 시스템 라이브러리
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: crates/claude-sync-gui/frontend
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: crates/claude-sync-gui
        run: cargo tauri build --target ${{ matrix.target }}

      # ── Artifact 수집 ──

      - name: Upload Windows installer (.exe)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: claude-sync-gui-windows-x64
          path: target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload macOS disk image (.dmg)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: claude-sync-gui-macos-${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x64' }}
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Linux packages (.deb + .AppImage)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: claude-sync-gui-linux-x64
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

  # ──────────────────────────────────────────────
  # GitHub Release 생성 및 업로드
  # ──────────────────────────────────────────────
  release:
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude Sync ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
